<!DOCTYPE html>
<html>
    <head>
        <title>Image Generator - CM2 Tools+</title>
        <link rel="stylesheet" href="../style.css">
        <script src="cm2.js"></script>
        <script>
            function generateImage() {
                const file = document.getElementById("imageInput").files[0];
                const downscale = Math.floor(Number(parseInt(document.getElementById("downscaleFactor").value)));
                const scale = Number(parseFloat(document.getElementById("scaleFactor").value));
                if (!file) {
                    alert("Please select an image file.");
                    return;
                }
                if (downscale < 1) {
                    alert("You can not upscale the image...");
                    return;
                }
                reset();

                const image = new Image();
                image.src = URL.createObjectURL(file);
                image.onload = function() {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(image, 0, 0);
                    for (let y = 0; y < image.height; y += downscale) {
                        for (let x = 0; x < image.width; x += downscale) {
                            const pixelData = ctx.getImageData(x, y, 1, 1).data;
                            const r = pixelData[0];
                            const g = pixelData[1];
                            const b = pixelData[2];
                            const a = pixelData[3];
                            if (a > 0) { // Only add blocks for non-transparent pixels
                                const gray = Math.round((r + g + b) / 3);
                                const blockId = 13; // You can change this to use different block types based on color
                                addBlock(blockId, (x - image.width / 2) * scale / downscale, (y - image.height / 2) * scale / downscale, 0, [gray]);
                            }
                        }
                    }
                }
                copy(compile())
                document.getElementById("output").textContent = "Generated Image!";
            }
        </script>
    </head>
    <body>
        <h1>Image Generator</h1>
        <p>Generate an image to paste into CM2.</p>
        <input type="file" id="imageInput" accept="image/*"><br><br>
        <input type="number" id="downscaleFactor" placeholder="Downscale Factor (e.g. 4)" value=""><br>
        <input type="number" id="scaleFactor" placeholder="Scale Factor (e.g. 1)" value=""><br>
        <button onclick="generateImage()">Generate Image</button><br>
        <p id="output"></p>
    </body>
    <footer>
        <a href="index.html">Back to Home</a>
    </footer>
</html>
