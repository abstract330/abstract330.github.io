<!DOCTYPE html>
<html>
    <head>
        <title>Text Generator - CM2 Tools+</title>
        <link rel="stylesheet" href="../style.css">
        <script src="cm2.js"></script>
    </head>
    <body>
        <h1>Text Generator</h1>
        <p>Generate text for your circuits.</p>
        <input type="text" id="textInput" placeholder="Enter text here">
        <button onclick="generateText()">Generate Text</button>
        <br><br>
        <div class="slider-container">
            <label for="spacingSlider">Spacing:</label>
            <input type="range" id="spacingSlider" min="0.2" max="1.5" step="0.05" value="0.5">
            <span id="spacingValue">0.5</span>
        </div>
        <p id="output"></p>
        <script>
            // Generate a string to place into cm2

            function generateText() {
                const input = document.getElementById("textInput").value;
                const output = document.getElementById("output");
                console.log(document.getElementById("spacingSlider").value);
                const spacing = parseFloat(document.getElementById("spacingSlider").value); // Spacing between characters
                reset();
                for (let i = 0; i < input.length; i++) {
                    const char = input[i];
                    const charCode = char.charCodeAt(0);
                    addBlock(13, (i - (input.length - 1) / 2) * spacing, 0, 0, [charCode]);
                }
                compile().then((result) => {
                    copy(result);
                    output.textContent = "Copied \"" + input + "\"!";
                });
            }
        </script>

        <script>
            // Run the function when the user presses Enter
            document.getElementById("textInput").onkeydown = function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    generateText();
                }
            };

            // Update spacing value display when slider changes
            document.getElementById("spacingSlider").oninput = function() {
                document.getElementById("spacingValue").textContent = this.value;
            };
        </script>
    </body>
    <footer>
        <a href="index.html">Back to Home</a>
    </footer>
</html>
