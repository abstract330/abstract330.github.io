<!DOCTYPE html>
<html>
    <head>
        <title>CM2 Tools+</title>
        <link rel="stylesheet" href="../style.css">
        <script src="cm2.js"></script>
    </head>
    <body>
        <h1>Building test!!!</h1>
        <p></p>
        <br><br>
        <script>
            function test() {
                reset()
                let a = addBlock(15, 0, 0, -5)
                let b = addBlock(15, 1, 0, -5)
                let c = addBlock(15, 2, 0, -5)
                addBuilding("AsciiKeyInput", 0, 0, 0);
                connectBuilding(a, 0, "ascii[0]")
                connectBuilding(b, 0, "ascii[1]")
                connectBuilding(c, 0, "ascii[2]")


                result = compile();
                copy(result)
                document.getElementById("output").textContent = JSON.stringify(circuit);
                document.getElementById("output2").textContent = result;
            }
        </script>
        <button onclick="test()">CLICK TO TESTTTTT</button>
        <p id="output"></p>
        <p id="output2"></p>
    </body>
    <footer>
        <a href="index.html">Back to Home</a>
    </footer>
</html>
