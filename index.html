<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- The number 0 represents the delay in seconds before redirecting -->
    <meta http-equiv="refresh" content="0; url=https://example.com/new-page">
    <title>Redirecting...</title>
</head>
<body>
    <!-- Fallback link for older browsers or accessibility -->
    <p>If you are not redirected automatically, <a href="https://example.com/new-page">click here</a>.</p>
</body>
</html>
